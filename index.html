<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="quotid-favicon.png">
<!-- Start cookieyes banner -->
<script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/90fad395248989c1d7f54ba84a823561/script.js"></script>
<!-- End cookieyes banner -->
<title>Quotid — a puzzle a day</title>
<script defer data-domain="quotidgames.com" src="https://plausible.io/js/script.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4EE; --card:#FFFFFF; --card-2:#FCFBF7;
    --ink:#26313F; --muted:#79838B; --line:#E8E3D8;
    --era:#E07C3A; --closer:#C23B2E; --pinpoint:#3F9E8E; --ten:#D99A3C;
    --flame:#E07C3A;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Nunito',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;
    min-height:100vh; padding:28px 20px 40px;
    background-image:
      radial-gradient(circle at 10% -8%, rgba(217,139,43,.10), transparent 42%),
      radial-gradient(circle at 90% -8%, rgba(110,111,221,.10), transparent 42%);
  }
  .wrap{max-width:880px;margin:0 auto}

  header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:6px}
  .brand{font-family:'Fredoka';font-weight:700;font-size:46px;letter-spacing:-.005em;line-height:1}
  .logo{height:64px;width:auto;display:block}
  html[data-theme="dark"] .logobox{background:#fff;border-radius:14px;padding:9px 14px;display:inline-block;box-shadow:0 8px 22px -10px rgba(0,0,0,.55)}
  .brand .q{color:var(--closer)}
  .brand .u{color:var(--flame)}
  .tag{font-family:'Nunito';font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin-top:10px}
  .live{display:inline-flex;align-items:center;gap:7px;margin-top:11px;font-size:13.5px;
    color:var(--muted);font-family:'Nunito'}
  .live b{font-family:'Fredoka';font-weight:600;color:var(--ink);font-size:14.5px}
  .livedot{width:8px;height:8px;border-radius:50%;background:#35B36A;
    box-shadow:0 0 0 0 rgba(53,179,106,.5);animation:livepulse 2.2s infinite}
  @keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(53,179,106,.45)}
    70%{box-shadow:0 0 0 7px rgba(53,179,106,0)}100%{box-shadow:0 0 0 0 rgba(53,179,106,0)}}
  @media (prefers-reduced-motion:reduce){.livedot{animation:none}}
  .streak{display:flex;align-items:center;gap:9px;background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:11px 18px;white-space:nowrap;
    box-shadow:0 6px 16px -10px rgba(90,70,40,.3)}
  .streak .flame{font-size:19px;filter:saturate(1.2)}
  .streak b{font-family:'Nunito';font-weight:700;font-size:18px}
  .streak span{font-size:14px;color:var(--muted)}

  /* save banner */
  .savebar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    margin:22px 0 0;padding:15px 19px;border-radius:14px;
    background:linear-gradient(100deg,#FFF4E8,#FFEFF0);
    border:1px solid #F3DEC9;box-shadow:0 8px 22px -16px rgba(180,110,60,.5)}
  .savebar[hidden]{display:none}
  .savebar .st{font-size:14.5px;line-height:1.4}
  .savebar .st b{font-family:'Fredoka';font-weight:700}
  .sbtns{display:flex;gap:8px}
  .sb{border:none;border-radius:10px;padding:11px 16px;font-family:'Fredoka';
    font-weight:600;font-size:14px;cursor:pointer}
  .sb-save{background:var(--flame);color:#fff}
  .sb-x{background:transparent;color:var(--muted);font-family:'Nunito';font-weight:500;font-size:13px}

  .today{display:flex;align-items:center;justify-content:space-between;gap:14px;
    margin:18px 0 18px;padding:15px 19px;background:var(--card-2);
    border:1px solid var(--line);border-radius:14px;flex-wrap:wrap;
    box-shadow:0 8px 20px -16px rgba(90,70,40,.35)}
  .today .date{font-family:'Fredoka';font-weight:600;font-size:21px}
  .today .date small{display:block;font-family:'Nunito';font-size:11px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;font-weight:500}
  .prog{display:flex;align-items:center;gap:13px}
  .prog .bars{display:flex;gap:5px}
  .prog .bar{width:32px;height:7px;border-radius:3px;background:var(--line)}
  .prog .bar.on{background:var(--flame)}
  .prog .pl{font-family:'Nunito';font-size:14px;color:var(--muted)}
  .prog .pl b{color:var(--ink)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{position:relative;display:block;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-radius:18px;padding:22px 22px 20px;overflow:hidden;
    cursor:pointer;box-shadow:0 10px 26px -18px rgba(90,70,40,.35);
    transition:transform .14s cubic-bezier(.2,.8,.2,1),border-color .2s,box-shadow .2s}
  .card::before{content:"";position:absolute;inset:0;border-radius:18px;opacity:.0;
    background:radial-gradient(circle at 82% -25%, var(--ac), transparent 58%);transition:opacity .25s}
  .card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--ac) 55%,var(--line));
    box-shadow:0 20px 38px -22px rgba(90,70,40,.5)}
  .card:hover::before{opacity:.10}
  .card:active{transform:translateY(-1px)}
  .ct{position:relative;z-index:1}
  .cname{font-family:'Fredoka';font-weight:700;font-size:30px;letter-spacing:0}
  .cbrain{font-family:'Nunito';font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ac);margin-top:3px;font-weight:700}
  .cverb{font-size:15.5px;color:var(--muted);line-height:1.5;margin:13px 0 16px;min-height:46px}

  .thumb{height:42px;margin:2px 0 16px;position:relative}
  .tline{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--line);border-radius:2px}
  .ttick{position:absolute;top:calc(50% - 5px);width:1px;height:10px;background:#CFC8BA}
  .tdot{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);background:var(--ac)}
  .grad{position:absolute;top:50%;left:0;right:0;height:3px;transform:translateY(-50%);border-radius:3px;
    background:linear-gradient(90deg,#5AA6E0,#5FC4C4,#EDB94A,#C23B2E)}
  .gdot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid var(--card)}
  .cross{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;
    border:2px solid var(--ac);border-radius:50%;opacity:.55}
  .cross::before,.cross::after{content:"";position:absolute;background:var(--ac);opacity:.5}
  .cross::before{top:50%;left:-12px;right:-12px;height:1px}
  .cross::after{left:50%;top:-12px;bottom:-12px;width:1px}
  .pin{position:absolute;top:50%;left:50%;width:11px;height:11px;border-radius:50%;transform:translate(-50%,-50%);background:var(--ac);box-shadow:0 0 12px var(--ac)}
  .tiles{display:flex;gap:7px;align-items:center;height:100%}
  .tile{width:30px;height:30px;border-radius:7px;background:#F6F1EA;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-family:'Nunito';font-weight:700;font-size:14px;color:var(--ink)}
  .tile.t{background:color-mix(in srgb,var(--ac) 16%,#fff);border-color:var(--ac);color:var(--ac)}

  .state{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:14px;border-top:1px solid var(--line)}
  .badge{display:inline-flex;align-items:center;gap:7px;font-family:'Nunito';font-size:13.5px;font-weight:500}
  .badge .pip{width:9px;height:9px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac)}
  .badge.done{color:var(--muted)}
  .badge.done .pip{background:var(--pinpoint);box-shadow:none}
  .badge .new{background:var(--ac);color:#fff;font-weight:700;padding:2px 8px;border-radius:5px;font-size:11px;letter-spacing:.08em}
  .cta{font-family:'Fredoka';font-weight:600;font-size:16px;color:var(--ac);display:flex;align-items:center;gap:5px}
  .cta.muted{color:var(--muted);font-family:'Nunito';font-weight:500;font-size:13px}
  .arrow{transition:transform .15s}
  .card:hover .arrow{transform:translateX(3px)}

  footer{text-align:center;margin-top:32px;color:var(--muted);font-size:13px;line-height:1.7}
  footer .lat{font-family:'Nunito';font-size:12px;letter-spacing:.12em}
  footer .note{font-size:12px;opacity:.7;margin-top:5px}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(52,40,30,.4);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:60}
  .modal[hidden]{display:none}
  .dialog{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:26px 24px;box-shadow:0 30px 60px -24px rgba(90,60,30,.45)}
  .dialog h3{font-family:'Fredoka';font-weight:700;font-size:23px;margin-bottom:8px}
  .dialog p{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:18px}
  .dialog input{width:100%;padding:14px;border-radius:11px;border:1px solid var(--line);
    background:#FCFBF7;color:var(--ink);font-family:'Nunito';font-size:15px}
  .dialog input:focus{outline:none;border-color:var(--flame)}
  .dialog .go{width:100%;margin-top:12px;padding:15px;border:none;border-radius:12px;background:var(--flame);
    color:#fff;font-family:'Fredoka';font-weight:600;font-size:16px;cursor:pointer}
  .dialog .later{width:100%;margin-top:10px;background:none;border:none;color:var(--muted);
    font-family:'Nunito';font-size:13px;cursor:pointer}
  .dialog .note2{font-size:11px;color:var(--muted);margin-top:14px;text-align:center;font-family:'Nunito'}

  @media (max-width:600px){.grid{grid-template-columns:1fr}.brand{font-size:36px}.cverb{min-height:0}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto}}

  /* ---- dark theme ---- */
  html[data-theme="dark"]{
    --bg:#161B24; --card:#1F2630; --card-2:#252E39;
    --ink:#F3EFE6; --muted:#9AA3B1; --line:rgba(243,239,230,.10);
  }
  html[data-theme="dark"] body{
    background-image:radial-gradient(circle at 10% -8%, rgba(245,144,26,.12), transparent 42%),
      radial-gradient(circle at 90% -8%, rgba(30,175,158,.12), transparent 42%);
  }
  html[data-theme="dark"] .savebar{background:linear-gradient(100deg,#2A2118,#2A1A1B);border-color:#3C2F22}
  html[data-theme="dark"] .tile{background:#161B24;color:var(--ink)}
  html[data-theme="dark"] .ttick{background:rgba(243,239,230,.20)}
  html[data-theme="dark"] .dialog input{background:#161B24;color:var(--ink)}
  html[data-theme="dark"] .gdot,html[data-theme="dark"] .dot{border-color:var(--card)}

  .themebtn{position:fixed;top:16px;right:16px;z-index:90;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:var(--card);color:var(--ink);display:flex;
    align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 20px -10px rgba(90,70,40,.4)}
  .themebtn:active{transform:scale(.94)}
  .themebtn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
</style>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('quotid_theme')||'light')}catch(e){}</script>
</head>
<body>
<button class="themebtn" id="themeBtn" aria-label="Switch theme"></button>
<div class="wrap">
  <header>
    <div>
      <div class="logobox"><img class="logo" src="quotid-games-logo.png" alt="Quotid Games"></div>
      <div class="tag">A puzzle a day · quotidgames.com</div>
      <div class="live"><span class="livedot"></span><b id="liveN">—</b>&nbsp;playing right now</div>
    </div>
    <div class="streak">
      <span class="flame">🔥</span><b id="streak">0</b><span>day streak</span>
    </div>
  </header>

  <div class="savebar" id="savebar" hidden>
    <div class="st"></div>
    <div class="sbtns">
      <button class="sb sb-save" id="sbSave">Save it</button>
      <button class="sb sb-x" id="sbX">Not now</button>
    </div>
  </div>

  <div class="today">
    <div class="date" id="date">—<small id="dow">TODAY</small></div>
    <div class="prog">
      <div class="bars" id="bars"></div>
      <div class="pl"><b id="done">0</b> of <b>4</b> played</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <div class="lat">quotidie — every day</div>
    <div class="note"><a href="privacy.html" style="color:inherit">Privacy</a> · Pacedall Labs</div>
  </footer>
</div>

<script>
/* ---- theme toggle (persists across all games) ---- */
const SUN='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';
const MOON='<svg viewBox="0 0 24 24"><path d="M21 12.8A8.5 8.5 0 1111.2 3a6.6 6.6 0 009.8 9.8z"/></svg>';
const themeBtn=document.getElementById('themeBtn');
function setTheme(t){document.documentElement.setAttribute('data-theme',t);
  themeBtn.innerHTML=t==='dark'?SUN:MOON;
  try{localStorage.setItem('quotid_theme',t)}catch(e){}}
(function(){let t;try{t=localStorage.getItem('quotid_theme')}catch(e){} setTheme(t||'light');})();
themeBtn.onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

/* ---- "playing right now" counter (decorative) ---- */
(function(){
  const el=document.getElementById('liveN');
  if(!el) return;
  const MINP=80, MAXP=101000;
  let n=MINP+Math.floor(Math.random()*(MAXP-MINP+1));
  const fmt=v=>v.toLocaleString('en-GB');
  el.textContent=fmt(n);
  setInterval(()=>{
    // small drift, scaled to current size, with a faint upward lean so it feels alive
    const swing=Math.max(3, Math.round(n*0.004));
    n+=Math.round((Math.random()-0.45)*swing*2);
    n=Math.min(MAXP, Math.max(MINP, n));
    el.textContent=fmt(n);
  }, 2400+Math.random()*2200);
})();

const Store=(()=>{let mem={};const K='quotid_v1';
  return {read(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):null}catch(e){return mem[K]||null}},
          write(o){try{localStorage.setItem(K,JSON.stringify(o))}catch(e){mem[K]=o}}}})();
function dstr(off=0){const d=new Date();d.setDate(d.getDate()+off);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// Demo fallback so the hub looks alive when nobody is signed in.
// When a real player is signed in (token present), we use their real Era progress instead.
const TODAY=dstr(0);
const TOKEN=(()=>{try{return localStorage.getItem('quotid_token')}catch(e){return null}})();
const DEMO={global:{cur:5,best:5,last:TODAY},daily:{closer:TODAY},
  streaks:{closer:{cur:4,best:4,last:TODAY}},account:null};
let state = TOKEN ? {global:{cur:0},daily:{},streaks:{},account:{signedIn:true}} : (Store.read()||DEMO);
state.daily=state.daily||{}; state.streaks=state.streaks||{}; state.global=state.global||{cur:0};

const GAMES=[
  {key:'era',name:'Era',brain:'Memory',ac:'var(--era)',
   verb:'Read the event, slide the marker to the year it happened.',thumb:'era',fallback:'ready',href:'era.html'},
  {key:'closer',name:'Closer',brain:'Numbers',ac:'var(--closer)',
   verb:'Home in on a hidden number — warmer, colder, four guesses.',thumb:'closer',fallback:'ready',href:'closer.html'},
  {key:'pinpoint',name:'Pinpoint',brain:'Places',ac:'var(--pinpoint)',
   verb:'See a place, drop a pin on the map. How close can you get?',thumb:'pinpoint',fallback:'new',href:'pinpoint.html'},
  {key:'ten',name:'Ten',brain:'Logic',ac:'var(--ten)',
   verb:'Combine the numbers to hit the target. No trivia required.',thumb:'ten',fallback:'ready',href:'ten.html'},
];

function thumbHTML(t){
  if(t==='era'){let h='<div class="tline"></div>';
    [12,34,56,78].forEach(p=>h+=`<div class="ttick" style="left:${p}%"></div>`);
    return h+'<div class="tdot" style="left:62%"></div>';}
  if(t==='closer'){let h='<div class="grad"></div>';
    [[20,'#5AA6E0'],[44,'#5FC4C4'],[68,'#EDB94A'],[82,'#C23B2E']].forEach(([p,c])=>h+=`<div class="gdot" style="left:${p}%;background:${c}"></div>`);
    return h;}
  if(t==='pinpoint')return '<div class="cross"></div><div class="pin"></div>';
  if(t==='ten')return `<div class="tiles"><div class="tile">7</div><div class="tile">3</div><div class="tile">9</div><div class="tile">·</div><div class="tile t">24</div></div>`;
  return '';
}
function badge(g){
  const done = state.daily[g.key]===TODAY;
  if(done){const n=(state.streaks[g.key]&&state.streaks[g.key].cur)||1;
    return `<span class="badge done"><span class="pip"></span>Played · ${n} day streak</span>
      <span class="cta muted" data-next>next in --:--:--</span>`;}
  if(g.fallback==='new')return `<span class="badge"><span class="new">NEW</span>Just launched</span>
    <span class="cta">Play <span class="arrow">→</span></span>`;
  return `<span class="badge"><span class="pip"></span>Today's puzzle ready</span>
    <span class="cta">Play <span class="arrow">→</span></span>`;
}

function render(){
  document.getElementById('grid').innerHTML=GAMES.map(g=>`
    <a class="card" style="--ac:${g.ac}" href="${g.href}" ${g.href==='#'?'onclick="return false"':''}>
      <div class="ct">
        <div><div class="cname">${g.name}</div><div class="cbrain">${g.brain}</div></div>
        <div class="cverb">${g.verb}</div>
        <div class="thumb">${thumbHTML(g.thumb)}</div>
        <div class="state">${badge(g)}</div>
      </div>
    </a>`).join('');

  document.getElementById('streak').textContent=state.global.cur||0;
  const playedCount=GAMES.filter(g=>state.daily[g.key]===TODAY).length;
  document.getElementById('done').textContent=playedCount;
  document.getElementById('bars').innerHTML=GAMES.map(g=>`<div class="bar ${state.daily[g.key]===TODAY?'on':''}"></div>`).join('');

  const bar=document.getElementById('savebar');
  if((state.global.cur||0)>=3 && !state.account){
    bar.querySelector('.st').innerHTML=`<b>You're on a ${state.global.cur}-day streak.</b> Create a free account to keep it safe across devices and get daily reminders.`;
    bar.hidden=false;
  } else { bar.hidden=true; }
  document.getElementById('sbX').onclick=()=>bar.hidden=true;
}

// date (independent of progress)
const now=new Date();
const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('date').childNodes[0].textContent=`${now.getDate()} ${months[now.getMonth()]}`;
document.getElementById('dow').textContent=days[now.getDay()];

// Pull real Era progress when signed in, then render.
async function initProgress(){
  if(TOKEN){
    try{
      const r=await fetch('/api/era/me',{headers:{Authorization:'Bearer '+TOKEN}});
      if(r.ok){
        const {progress}=await r.json();
        if(progress){
          if(progress.playedToday) state.daily.era=TODAY;
          state.streaks.era={cur:progress.current};
          state.global.cur=progress.current||0;
        }
      }
    }catch(e){/* fall back to whatever state we have */}
  }
  render();
}
initProgress();

// modal
function buildModal(){
  if(document.getElementById('saveModal'))return;
  const m=document.createElement('div');m.className='modal';m.id='saveModal';m.hidden=true;
  m.innerHTML=`<div class="dialog">
    <h3>Save your progress</h3>
    <p>Keep your streaks across every device and get a gentle nudge when each day's puzzles are ready.</p>
    <input id="em" type="email" placeholder="you@email.com" autocomplete="email">
    <button class="go" id="go">Create free account</button>
    <button class="later" id="later">Maybe later</button>
    <div class="note2">Prototype — no account is created yet</div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)m.hidden=true});
  m.querySelector('#later').onclick=()=>m.hidden=true;
  m.querySelector('#go').onclick=()=>{const v=m.querySelector('#em').value.trim();
    if(!v.includes('@')){m.querySelector('#em').focus();return}
    state.account={email:v};Store.write(state);m.hidden=true;
    bar.querySelector('.st').innerHTML=`<b>✓ Saved.</b> Your streak is safe — we'll remind you tomorrow.`;
    bar.querySelector('.sbtns').style.display='none';};
}
buildModal();
document.getElementById('sbSave').onclick=()=>document.getElementById('saveModal').hidden=false;

function tick(){const n=new Date();const mid=new Date(n);mid.setHours(24,0,0,0);
  let s=Math.floor((mid-n)/1000);
  const hh=String(Math.floor(s/3600)).padStart(2,'0'),mm=String(Math.floor(s%3600/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');
  document.querySelectorAll('[data-next]').forEach(e=>e.textContent=`next in ${hh}:${mm}:${ss}`);}
tick();setInterval(tick,1000);
</script>
</body>
</html>
