<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Era</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#181320; --surface:#241D2E; --surface-2:#2F2738;
    --paper:#F4EEE6; --muted:#A096AD; --line:rgba(244,238,230,.10);
    --amber:#F5901A; --amber-deep:#C77A22; --truth:#7BD389;
    --saver:rgba(255,255,255,.03); --btnbg:var(--surface-2);
  }
  html[data-theme="light"]{
    --ink:#FDF5DA; --surface:#FFFFFF; --surface-2:#FFFDF6;
    --paper:#1C222E; --muted:#79808E; --line:#EBE2CB;
    --saver:rgba(0,0,0,.035); --btnbg:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--ink); color:var(--paper);
    font-family:'Nunito',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:center;
    padding:20px; overflow:hidden;
    background-image:radial-gradient(circle at 50% -10%, rgba(242,169,60,.10), transparent 55%);
  }
  .app{width:100%;max-width:560px}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
  .brand{font-family:'Fredoka';font-weight:700;font-size:30px;letter-spacing:0}
  .brand .dot{color:var(--amber)}
  .meta{font-family:'Nunito';font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
  .meta b{color:var(--paper)}

  .card{
    background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line); border-radius:18px;
    padding:26px 24px 28px; box-shadow:0 24px 60px -30px rgba(0,0,0,.7);
  }
  .eyebrow{font-family:'Nunito';font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--amber);margin-bottom:14px}
  .prompt{font-family:'Fredoka';font-weight:600;font-size:25px;
    line-height:1.22;letter-spacing:0;min-height:62px}

  .readout{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:26px 0 6px}
  .year{font-family:'Nunito';font-weight:700;font-size:52px;color:var(--amber);
    letter-spacing:0;line-height:.9;transition:color .2s}
  .year.locked{color:var(--paper)}
  .yhint{font-family:'Nunito';font-size:11px;color:var(--muted);padding-bottom:8px}

  /* timeline */
  .tl{position:relative;height:74px;margin:8px 2px 4px;touch-action:none;user-select:none}
  .track{position:absolute;top:38px;left:0;right:0;height:3px;background:var(--line);border-radius:2px}
  .ticks{position:absolute;top:44px;left:0;right:0;height:24px}
  .tick{position:absolute;transform:translateX(-50%);text-align:center}
  .tick i{display:block;width:1px;height:7px;background:var(--line);margin:0 auto 4px}
  .tick span{font-family:'Nunito';font-size:10px;color:var(--muted)}
  .span{position:absolute;top:37px;height:5px;background:var(--amber);opacity:0;border-radius:3px;
    box-shadow:0 0 14px rgba(242,169,60,.5);transition:opacity .3s}
  .span.show{opacity:.85}

  .head-h{position:absolute;top:2px;width:3px;height:68px;background:var(--amber);
    transform:translateX(-1.5px);cursor:grab;border-radius:3px;
    box-shadow:0 0 0 10px rgba(245,144,26,.12)}
  .head-h:active{cursor:grabbing}
  .head-h::after{content:"";position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    width:26px;height:26px;border-radius:50%;background:var(--amber);border:3px solid var(--surface);
    box-shadow:0 2px 10px rgba(245,144,26,.6)}
  .head-h.locked{background:var(--muted);box-shadow:none}
  .head-h.locked::after{background:var(--muted);box-shadow:none}
  .head-t{position:absolute;top:6px;width:2px;height:64px;background:var(--truth);
    transform:translateX(-1px);border-radius:2px;opacity:0;transition:opacity .35s,left .55s cubic-bezier(.2,.8,.2,1)}
  .head-t::after{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);
    width:13px;height:13px;border-radius:50%;background:var(--truth);box-shadow:0 0 16px rgba(123,211,137,.6)}
  .head-t.show{opacity:1}
  .tlabel{position:absolute;top:-20px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-family:'Nunito';font-size:10px;color:var(--truth);font-weight:700}

  .result{text-align:center;margin-top:18px;min-height:48px}
  .result .off{font-family:'Fredoka';font-weight:700;font-size:22px;opacity:0;transition:opacity .3s}
  .result .off.show{opacity:1}
  .result .pts{font-family:'Nunito';font-size:12px;color:var(--muted);margin-top:4px;opacity:0;transition:opacity .3s}
  .result .pts.show{opacity:1}

  .btn{width:100%;margin-top:22px;padding:16px;border:none;border-radius:13px;
    font-family:'Fredoka';font-weight:600;font-size:17px;cursor:pointer;
    background:var(--amber);color:#241803;letter-spacing:.01em;transition:transform .08s,filter .2s}
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--paper);border:1px solid var(--line)}
  .btn:disabled{opacity:.4;cursor:default}

  .end{text-align:center;padding:8px 4px}
  .end h2{font-family:'Fredoka';font-weight:700;font-size:24px;margin-bottom:6px}
  .end .big{font-family:'Nunito';font-weight:700;font-size:64px;color:var(--amber);margin:10px 0}
  .end p{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:4px}
  .hint{text-align:center;font-size:12px;color:var(--muted);margin-top:16px;font-family:'Nunito'}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  @media (max-width:430px){.prompt{font-size:21px}.year{font-size:44px}.brand{font-size:26px}}
  .streakline{font-family:'Nunito';font-weight:700;font-size:15px;color:var(--amber);margin-top:16px}
  .saver{margin-top:14px;padding:16px 16px 14px;border:1px solid var(--line);border-radius:13px;
    background:var(--saver);text-align:left}
  .saver h4{font-family:'Fredoka';font-weight:600;font-size:15px;margin-bottom:5px}
  .saver p{font-size:12.5px;color:var(--muted);line-height:1.45;margin-bottom:12px}
  .saver .btn{margin-top:0;font-size:15px;padding:13px}
  .modal{position:fixed;inset:0;background:rgba(10,8,14,.72);display:flex;align-items:center;
    justify-content:center;padding:20px;z-index:50}
  .modal[hidden]{display:none}
  .dialog{width:100%;max-width:380px;background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line);border-radius:18px;padding:26px 24px}
  .dialog h3{font-family:'Fredoka';font-weight:700;font-size:22px;margin-bottom:8px}
  .dialog p{font-size:13.5px;color:var(--muted);line-height:1.5;margin-bottom:18px}
  .dialog input{width:100%;padding:14px;border-radius:11px;border:1px solid var(--line);
    background:var(--ink);color:var(--paper);font-family:'Nunito';font-size:15px}
  .dialog input:focus{outline:none;border-color:var(--amber)}
  .dialog .btn{margin-top:12px}
  .linkbtn{background:none;border:none;color:var(--muted);font-family:'Nunito';font-size:13px;
    cursor:pointer;margin-top:12px;width:100%}
  .note2{font-size:11px;color:var(--muted);margin-top:14px;text-align:center;font-family:'Nunito'}
  .themebtn{position:fixed;top:14px;right:14px;z-index:90;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:var(--btnbg);color:var(--paper);display:flex;
    align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 18px -8px rgba(0,0,0,.5)}
  .themebtn:active{transform:scale(.94)}
  .themebtn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
</style>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('quotid_theme')||'dark')}catch(e){}</script>
</head>
<body>
<button class="themebtn" id="themeBtn" aria-label="Switch theme"></button>
<div class="app">
  <div class="head">
    <div class="brand">Era<span class="dot">.</span></div>
    <div class="meta">ROUND <b id="rnum">1</b>/<span id="rtot">5</span><br>SCORE <b id="score">0</b></div>
  </div>
  <div class="card" id="card"></div>
  <div class="hint" id="hint">Loading today's puzzle…</div>
</div>

<script>

/* ---- theme toggle (persists across all games) ---- */
const SUN='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';
const MOON='<svg viewBox="0 0 24 24"><path d="M21 12.8A8.5 8.5 0 1111.2 3a6.6 6.6 0 009.8 9.8z"/></svg>';
const themeBtn=document.getElementById('themeBtn');
function setTheme(t){document.documentElement.setAttribute('data-theme',t);
  themeBtn.innerHTML=t==='dark'?SUN:MOON;
  try{localStorage.setItem('quotid_theme',t)}catch(e){}}
(function(){let t;try{t=localStorage.getItem('quotid_theme')}catch(e){} setTheme(t||'dark');})();
themeBtn.onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

/* ---------- config ---------- */
let MIN=1965, MAX=2025, ROUNDS=5;
let deck=[], idx=0, score=0, guess=Math.round((MIN+MAX)/2), locked=false;
let serverProgress=null; // {current,best,playedToday} when logged in

/* ---------- safe token + state storage ---------- */
const SS=(()=>{let mem={};return{
  get(k){try{return localStorage.getItem(k)}catch(e){return mem[k]||null}},
  set(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}}})();
function token(){return SS.get('quotid_token')}
function dstr(o=0){const d=new Date();d.setDate(d.getDate()+o);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

/* local streak fallback for anonymous players */
const State=(()=>{let mem={};const K='quotid_v1';
  return {read(){try{const r=localStorage.getItem(K);return r?JSON.parse(r):null}catch(e){return mem[K]||null}},
          write(o){try{localStorage.setItem(K,JSON.stringify(o))}catch(e){mem[K]=o}}}})();
function loadState(){return State.read()||{daily:{},streaks:{},global:{cur:0,best:0,last:null},account:null}}
function recordLocalPlay(){const s=loadState(),t=dstr(0),y=dstr(-1);
  if(s.daily.era===t)return s;
  const gs=s.streaks.era||{cur:0,best:0,last:null};
  gs.cur=(gs.last===y)?gs.cur+1:1; gs.best=Math.max(gs.best,gs.cur); gs.last=t; s.streaks.era=gs;
  s.global.cur=(s.global.last===y)?s.global.cur+1:1; s.global.last=t;
  s.daily.era=t; State.write(s); return s}

/* ---------- API ---------- */
async function api(path,opts={}){
  const h={'Content-Type':'application/json'}; const t=token();
  if(t)h['Authorization']='Bearer '+t;
  const r=await fetch(path,{...opts,headers:h});
  return {ok:r.ok,status:r.status,data:await r.json().catch(()=>({}))};
}

/* ---------- boot ---------- */
const card=document.getElementById('card');
function pct(y){return (y-MIN)/(MAX-MIN)*100}

async function boot(){
  try{
    const {ok,data}=await api('/api/era/today');
    if(ok && data.rounds && data.rounds.length){
      deck=data.rounds; ROUNDS=deck.length; MIN=data.minYear||MIN; MAX=data.maxYear||MAX;
      serverProgress=data.progress||null;
    } else throw new Error('no data');
  }catch(e){
    // offline / API down: let them still play with a tiny embedded fallback
    deck=[{text:"The first iPhone goes on sale",year:2007},
          {text:"The Berlin Wall falls",year:1989},
          {text:"Google is founded",year:1998},
          {text:"Instagram launches",year:2010},
          {text:"Live Aid is broadcast around the world",year:1985}];
    ROUNDS=deck.length;
  }
  document.getElementById('rtot').textContent=ROUNDS;
  idx=0; score=0; document.getElementById('score').textContent=0;
  round();
}

function round(){
  locked=false; guess=Math.round((MIN+MAX)/2);
  const ev=deck[idx];
  document.getElementById('rnum').textContent=idx+1;
  document.getElementById('hint').textContent="Drag the playhead — or use ← → keys";
  let ticks='';
  for(let d=1970;d<=2020;d+=10){ticks+=`<div class="tick" style="left:${pct(d)}%"><i></i><span>${d}</span></div>`}
  card.innerHTML=`
    <div class="eyebrow">When did it happen?</div>
    <div class="prompt">${ev.text}</div>
    <div class="readout"><div class="year" id="yr">${guess}</div></div>
    <div class="tl" id="tl">
      <div class="track"></div>
      <div class="ticks">${ticks}</div>
      <div class="span" id="span"></div>
      <div class="head-t" id="ht"><div class="tlabel" id="tlab"></div></div>
      <div class="head-h" id="hh" tabindex="0" role="slider" aria-valuemin="${MIN}" aria-valuemax="${MAX}" aria-valuenow="${guess}"></div>
    </div>
    <div class="result"><div class="off" id="off"></div><div class="pts" id="pts"></div></div>
    <button class="btn" id="go">Lock in ${guess}</button>`;
  position(); bind();
}
function position(){
  document.getElementById('hh').style.left=pct(guess)+'%';
  document.getElementById('yr').textContent=guess;
  if(!locked) document.getElementById('go').textContent='Lock in '+guess;
  document.getElementById('hh').setAttribute('aria-valuenow',guess);
}
function bind(){
  const tl=document.getElementById('tl'), hh=document.getElementById('hh');
  let drag=false;
  const toYear=cx=>{const r=tl.getBoundingClientRect();
    let p=Math.min(1,Math.max(0,(cx-r.left)/r.width));return Math.round(MIN+p*(MAX-MIN))};
  const move=e=>{if(locked)return;guess=toYear(e.clientX);position()};
  tl.addEventListener('pointerdown',e=>{if(locked)return;drag=true;tl.setPointerCapture(e.pointerId);move(e)});
  tl.addEventListener('pointermove',e=>{if(drag)move(e)});
  tl.addEventListener('pointerup',()=>drag=false);
  tl.addEventListener('pointercancel',()=>drag=false);
  hh.addEventListener('keydown',e=>{if(locked)return;
    if(e.key==='ArrowLeft'){guess=Math.max(MIN,guess-(e.shiftKey?5:1));position();e.preventDefault()}
    if(e.key==='ArrowRight'){guess=Math.min(MAX,guess+(e.shiftKey?5:1));position();e.preventDefault()}
    if(e.key==='Enter')lock()});
  document.getElementById('go').addEventListener('click',()=>locked?next():lock());
}
function lock(){
  locked=true;
  const ev=deck[idx], off=Math.abs(guess-ev.year);
  const pts=Math.max(0,100-off*8);
  score+=pts; document.getElementById('score').textContent=score;
  document.getElementById('hh').classList.add('locked');
  const ht=document.getElementById('ht');
  ht.style.left=pct(ev.year)+'%';
  document.getElementById('tlab').textContent=ev.year;
  const span=document.getElementById('span');
  const a=Math.min(pct(guess),pct(ev.year)), b=Math.max(pct(guess),pct(ev.year));
  span.style.left=a+'%'; span.style.width=(b-a)+'%';
  document.getElementById('yr').classList.add('locked');
  setTimeout(()=>{ht.classList.add('show');span.classList.add('show')},60);
  const offEl=document.getElementById('off'), ptsEl=document.getElementById('pts');
  let msg = off===0?"Spot on.":off===1?"One year off.":off+" years off.";
  let tone = off===0?"Bullseye — ":off<=2?"So close — ":off<=6?"Not bad — ":off<=12?"In the ballpark — ":"Way off — ";
  offEl.textContent=tone+msg; ptsEl.textContent="+"+pts+" pts";
  setTimeout(()=>{offEl.classList.add('show');ptsEl.classList.add('show')},120);
  const go=document.getElementById('go');
  go.textContent = idx+1>=ROUNDS ? "See results" : "Next →";
  document.getElementById('hint').textContent="";
}
function next(){idx++; idx>=ROUNDS?end():round()}

async function end(){
  // record the play: server if logged in, local otherwise
  let prog=null;
  if(token()){
    const {ok,data}=await api('/api/era/result',{method:'POST',body:JSON.stringify({score})});
    if(ok)prog=data.progress;
  }
  if(!prog){const s=recordLocalPlay(); prog={current:s.streaks.era.cur,best:s.streaks.era.best,local:true};}
  const acct=!!token();
  const avg=Math.round(score/ROUNDS);
  let verdict = avg>=85?"You were there for all of it.":avg>=65?"A sharp memory for the decades.":avg>=45?"Solid instincts.":"The timeline blurs a little.";
  const saver = acct
    ? `<div class="streakline">🔥 ${prog.current} day streak · saved to your account</div>`
    : `<div class="streakline">🔥 ${prog.current} day streak</div>
       <div class="saver" data-saver>
         <h4>Don't lose your streak</h4>
         <p>Right now this only lives on this device. Create a free account to keep it safe everywhere and get a daily reminder.</p>
         <button class="btn" id="openSave">Save my progress</button>
       </div>`;
  card.innerHTML=`<div class="end">
    <h2>Today's Era, done.</h2>
    <div class="big">${score}</div>
    <p>${verdict}</p>
    <p style="font-family:'Nunito';font-size:12px;margin-top:10px;color:var(--muted)">avg ${avg} pts / round · come back tomorrow for a new set</p>
    ${saver}
    <button class="btn ghost" id="again" style="margin-top:16px">Play again (practice)</button>
  </div>`;
  document.getElementById('hint').textContent="";
  document.getElementById('again').addEventListener('click',()=>{idx=0;score=0;document.getElementById('score').textContent=0;round();});
  buildModal();
  const os=document.getElementById('openSave');
  if(os)os.onclick=()=>document.getElementById('saveModal').hidden=false;
}

/* ---------- account modal (real auth) ---------- */
function buildModal(){
  if(document.getElementById('saveModal'))return;
  const m=document.createElement('div');m.className='modal';m.id='saveModal';m.hidden=true;
  m.innerHTML=`<div class="dialog">
    <h3>Save your streak</h3>
    <p>Create a free account to keep your streak safe, play on any device, and get a nudge when tomorrow's puzzle drops.</p>
    <input id="saveEmail" type="email" placeholder="you@email.com" autocomplete="email">
    <input id="savePass" type="password" placeholder="create a password" autocomplete="new-password" style="margin-top:10px">
    <div style="font-size:11.5px;color:var(--muted);margin-top:8px">At least 8 characters, including a letter, a number and a symbol.</div>
    <button class="btn" id="saveGo" style="margin-top:12px">Save my streak</button>
    <div id="saveErr" style="color:#E88;font-size:12px;margin-top:10px;text-align:center;min-height:14px"></div>
    <button class="linkbtn" id="saveForgot">Forgot your password?</button>
    <button class="linkbtn" id="saveLater" style="margin-top:2px">Maybe later</button>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)m.hidden=true});
  m.querySelector('#saveLater').onclick=()=>m.hidden=true;
  m.querySelector('#saveGo').onclick=doSave;
  m.querySelector('#saveForgot').onclick=doForgot;
}
function pwIssue(p){
  if(p.length<8)return 'Password needs at least 8 characters';
  if(!/[A-Za-z]/.test(p))return 'Add a letter to your password';
  if(!/[0-9]/.test(p))return 'Add a number to your password';
  if(!/[^A-Za-z0-9]/.test(p))return 'Add a symbol to your password';
  return null;
}
async function doForgot(){
  const email=document.getElementById('saveEmail').value.trim();
  const err=document.getElementById('saveErr');
  if(!email.includes('@')){err.style.color='#E88';err.textContent='Enter your email above first';return}
  err.style.color='var(--muted)'; err.textContent='…';
  await api('/api/auth/forgot',{method:'POST',body:JSON.stringify({email})});
  err.style.color='#7BD389';
  err.textContent='If that email has an account, a reset link is on its way.';
}
async function doSave(){
  const email=document.getElementById('saveEmail').value.trim();
  const pass=document.getElementById('savePass').value;
  const err=document.getElementById('saveErr'); err.style.color='#E88';
  if(!email.includes('@')){err.textContent='Enter a valid email';return}
  const issue=pwIssue(pass); if(issue){err.textContent=issue;return}
  err.style.color='var(--muted)'; err.textContent='…';
  // try register; if the email exists, fall back to login
  let res=await api('/api/auth/register',{method:'POST',body:JSON.stringify({email,password:pass})});
  let registered = res.ok;
  if(res.status===409) res=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})});
  if(!res.ok || !res.data.token){
    err.style.color='#E88';
    err.textContent = res.data.error==='invalid_credentials' ? 'That email is taken — wrong password?'
                    : res.data.error==='weak_password' ? 'Password not strong enough'
                    : 'Something went wrong';
    return;
  }
  SS.set('quotid_token',res.data.token);
  await api('/api/era/result',{method:'POST',body:JSON.stringify({score})});
  document.getElementById('saveModal').hidden=true;
  const sv=document.querySelector('[data-saver]');
  if(sv){
    const note = registered
      ? '✓ Streak saved — check your inbox to verify your email'
      : '✓ Streak saved — we\'ll remind you tomorrow';
    sv.outerHTML='<div class="streakline">'+note+'</div>';
  }
}

boot();
</script>
</body>
</html>
