<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password · Quotid</title>
<link rel="icon" type="image/png" href="images/quotid-favicon.png">
<script defer data-domain="quotidgames.com" src="https://plausible.io/js/script.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F6F4EE;--card:#fff;--ink:#26313F;--muted:#79838B;--line:#E8E3D8;--red:#C23B2E}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}
  .box{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:28px 24px;box-shadow:0 22px 50px -28px rgba(90,60,30,.4)}
  h1{font-family:'Fredoka';font-weight:700;font-size:24px;margin-bottom:8px}
  p{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:18px}
  input{width:100%;padding:14px;border:1px solid var(--line);border-radius:11px;background:#FCFBF7;
    color:var(--ink);font-family:'Nunito';font-size:15px;margin-bottom:11px}
  input:focus{outline:none;border-color:var(--red)}
  .rule{font-size:12px;color:var(--muted);margin:-4px 0 14px}
  button{width:100%;padding:15px;border:none;border-radius:12px;background:var(--red);color:#fff;
    font-family:'Fredoka';font-weight:600;font-size:16px;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .msg{font-size:13px;margin-top:12px;min-height:16px;text-align:center}
  .msg.err{color:var(--red)}
  .msg.ok{color:#1E9E6A}
  a{color:var(--red);font-weight:600;text-decoration:none}
</style>
</head>
<body>
  <div class="box">
    <h1>Choose a new password</h1>
    <p>Pick a strong password for your Quotid account.</p>
    <input id="p1" type="password" placeholder="New password" autocomplete="new-password">
    <input id="p2" type="password" placeholder="Confirm password" autocomplete="new-password">
    <div class="rule">At least 8 characters, including a letter, a number and a symbol.</div>
    <button id="go">Update password</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  const token=new URLSearchParams(location.search).get('token');
  const msg=document.getElementById('msg'), go=document.getElementById('go');
  function bad(p){
    if(p.length<8)return 'Use at least 8 characters';
    if(!/[A-Za-z]/.test(p))return 'Add a letter';
    if(!/[0-9]/.test(p))return 'Add a number';
    if(!/[^A-Za-z0-9]/.test(p))return 'Add a symbol';
    return null;
  }
  if(!token){msg.className='msg err';msg.textContent='This reset link is missing or invalid.';go.disabled=true;}
  go.onclick=async()=>{
    const p1=document.getElementById('p1').value, p2=document.getElementById('p2').value;
    const issue=bad(p1);
    if(issue){msg.className='msg err';msg.textContent=issue;return;}
    if(p1!==p2){msg.className='msg err';msg.textContent='Passwords do not match';return;}
    go.disabled=true; msg.className='msg'; msg.textContent='Updating…';
    try{
      const r=await fetch('/api/auth/reset',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token,password:p1})});
      const d=await r.json();
      if(r.ok){msg.className='msg ok';msg.innerHTML='Password updated. <a href="era.html">Back to Era →</a>';}
      else{msg.className='msg err';msg.textContent=d.error==='invalid_token'?'This link has expired — request a new one.':'Could not update password.';go.disabled=false;}
    }catch(e){msg.className='msg err';msg.textContent='Network error — try again.';go.disabled=false;}
  };
</script>
</body>
</html>
