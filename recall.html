<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recall · Quotid Arcade</title>
<link rel="icon" type="image/png" href="quotid-favicon.png">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('quotid_theme')||'light')}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F6F4EE;--card:#FFFFFF;--ink:#26313F;--muted:#79838B;--line:#E8E3D8;--ac:#D99A3C;--btnbg:#fff;
    --tile:#EDEAE0;--red:#C23B2E;--teal:#3F9E8E}
  html[data-theme="dark"]{--bg:#161B24;--card:#1F2630;--ink:#F3EFE6;--muted:#9AA3B1;--line:rgba(243,239,230,.12);--btnbg:#1F2630;--tile:#2A3340}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,sans-serif;font-variant-numeric:tabular-nums;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;overflow:hidden}
  .bar{width:100%;max-width:480px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .back{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:10px;padding:8px 12px;background:var(--card)}
  .title{font-family:'Fredoka';font-weight:700;font-size:22px}.title .d{color:var(--ac)}
  .themebtn{margin-left:auto;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--btnbg);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .themebtn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .hud{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-family:'Fredoka';font-weight:600}
  .hud .s{font-size:15px;color:var(--muted)}.hud .s b{color:var(--ink);font-size:22px;margin-left:4px}
  .phase{font-family:'Fredoka';font-weight:600;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--ac)}
  .stage{position:relative;width:100%;max-width:480px;aspect-ratio:1;background:var(--card);border:1px solid var(--line);
    border-radius:22px;overflow:hidden;box-shadow:0 18px 50px -28px rgba(90,60,30,.5);padding:16px;display:flex}
  .grid{flex:1;display:grid;gap:10px}
  .tile{border:none;border-radius:13px;background:var(--tile);cursor:pointer;transition:background .12s,transform .08s;min-height:0}
  .tile:active{transform:scale(.96)}
  .tile.lit{background:var(--ac)}
  .tile.found{background:var(--teal)}
  .tile.bad{background:var(--red)}
  .ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;background:color-mix(in srgb,var(--card) 84%,transparent);backdrop-filter:blur(2px);z-index:5}
  .ov[hidden]{display:none}
  .ov h2{font-family:'Fredoka';font-weight:700;font-size:30px;margin-bottom:8px}
  .ov p{color:var(--muted);font-size:15px;line-height:1.5;max-width:300px;margin-bottom:20px}
  .ov .big{font-family:'Fredoka';font-weight:700;font-size:60px;color:var(--ac);line-height:1}
  .ov .sub{font-family:'Fredoka';color:var(--muted);font-size:14px;margin:6px 0 20px}
  .btn{font-family:'Fredoka';font-weight:600;font-size:17px;padding:14px 28px;border:none;border-radius:13px;background:var(--ac);color:#fff;cursor:pointer}
  @media (prefers-reduced-motion:reduce){.tile{transition:none}}
</style>
</head>
<body>
  <div class="bar"><a class="back" href="quotid-arcade.html">← Arcade</a><div class="title">Recall<span class="d">.</span></div><button class="themebtn" id="themeBtn" aria-label="Theme"></button></div>
  <div class="hud"><div class="s">ROUND<b id="round">0</b></div><div class="phase" id="phase">memory</div><div class="s">BEST<b id="best">0</b></div></div>
  <div class="stage" id="stage">
    <div class="grid" id="grid"></div>
    <div class="ov" id="ov">
      <h2>Recall</h2>
      <p>Tiles light up for a moment. When they fade, tap exactly the ones that were lit. One wrong tap ends it.</p>
      <button class="btn" id="startBtn">Tap to start</button>
    </div>
  </div>
<script>
  const SUN='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>';
  const MOON='<svg viewBox="0 0 24 24"><path d="M21 12.8A8.5 8.5 0 1111.2 3a6.6 6.6 0 009.8 9.8z"/></svg>';
  const tb=document.getElementById('themeBtn');
  function setTheme(t){document.documentElement.setAttribute('data-theme',t);tb.innerHTML=t==='dark'?SUN:MOON;try{localStorage.setItem('quotid_theme',t)}catch(e){}}
  (function(){let t;try{t=localStorage.getItem('quotid_theme')}catch(e){}setTheme(t||'light')})();
  tb.onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

  const grid=document.getElementById('grid'), ov=document.getElementById('ov');
  let state='ready',round=0,best=0,N=3,pattern=new Set(),remaining=new Set(),tiles=[];

  function gridFor(r){ if(r>=10)return 5; if(r>=5)return 4; return 3; }
  function buildGrid(n){N=n;grid.style.gridTemplateColumns=`repeat(${n},1fr)`;grid.style.gridTemplateRows=`repeat(${n},1fr)`;
    grid.innerHTML='';tiles=[];for(let i=0;i<n*n;i++){const b=document.createElement('button');b.className='tile';b.dataset.i=i;
      b.onclick=()=>pick(i);grid.appendChild(b);tiles.push(b);}}
  function phase(t){document.getElementById('phase').textContent=t;}
  function hud(){document.getElementById('round').textContent=round;document.getElementById('best').textContent=best;}

  function startRound(){
    const n=gridFor(round); if(n!==N||tiles.length===0)buildGrid(n);
    tiles.forEach(t=>t.className='tile');
    const k=Math.min(N*N-1, round+2);          // tiles to remember
    pattern=new Set(); while(pattern.size<k)pattern.add(Math.floor(Math.random()*N*N));
    remaining=new Set(pattern);
    state='show'; phase('memorise');
    pattern.forEach(i=>tiles[i].classList.add('lit'));
    const showMs=Math.max(550, 1000 - round*45);
    setTimeout(()=>{ if(state!=='show')return; pattern.forEach(i=>tiles[i].classList.remove('lit'));
      state='input'; phase('your turn'); }, showMs);
  }
  function pick(i){
    if(state!=='input')return;
    if(pattern.has(i)){
      if(remaining.has(i)){tiles[i].classList.add('found');remaining.delete(i);
        if(remaining.size===0){round++;hud();state='show';phase('nice');setTimeout(startRound,500);}}
    } else { tiles[i].classList.add('bad'); over(); }
  }
  function start(){round=1;hud();ov.hidden=true;startRound();}
  function over(){
    state='over';
    const cleared=Math.max(0,round-1);
    best=Math.max(best,cleared);
    // reveal any correct tiles the player missed
    pattern.forEach(i=>{if(!tiles[i].classList.contains('found'))tiles[i].classList.add('lit');});
    setTimeout(()=>{
      ov.innerHTML=`<div class="big">${cleared}</div><div class="sub">rounds cleared · best ${best}</div><button class="btn" id="startBtn">Tap to retry</button>`;
      ov.hidden=false;ov.querySelector('#startBtn').onclick=start;hud();
    },650);
  }
  document.getElementById('startBtn').onclick=start;
  buildGrid(3);hud();
</script>
</body>
</html>
